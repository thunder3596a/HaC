name: Deploy UserBrowser

on:
  push:
    branches:
      - main
    paths:
      - "Docker-NonCritical/Tools/UserBrowser/**"
      - ".forgejo/workflows/deploy-userbrowser.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker-noncritical
    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify compose and source files exist
        run: |
          ls -l "./Docker-NonCritical/Tools/UserBrowser/userbrowser.yml"
          ls -l "./UserBrowser/app.py"
          ls -l "./UserBrowser/Dockerfile"

      - name: Deploy UserBrowser
        working-directory: "./Docker-NonCritical/Tools/UserBrowser"
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          CERTRESOLVER: ${{ vars.CERTRESOLVER }}
          SEARX_INTERNAL_URL: ${{ vars.SEARX_INTERNAL_URL }}
        run: |
          for var in DOMAIN_NAME CERTRESOLVER SEARX_INTERNAL_URL; do
            eval val=\$$var
            if [ -z "$val" ]; then
              echo "Missing required variable: $var" >&2
              exit 1
            fi
          done

          # Copy app source to config dir so Docker build context is available on host
          sudo mkdir -p /srv/userbrowser
          sudo cp -r "$GITHUB_WORKSPACE/UserBrowser/." /srv/userbrowser/src/
          sudo cp userbrowser.yml /srv/userbrowser/userbrowser.yml

          checksum=$(find "$GITHUB_WORKSPACE/UserBrowser" -type f | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          old=$(cat ~/.hac-noncritical/.userbrowser_checksum 2>/dev/null || echo "")

          if [ "$checksum" != "$old" ]; then
            echo "Changes detected — rebuilding and redeploying UserBrowser..."
            mkdir -p ~/.hac-noncritical

            cd /srv/userbrowser
            docker compose -p userbrowser down --remove-orphans || true
            docker build -t userbrowser:latest ./src/
            DOMAIN_NAME=${DOMAIN_NAME} \
            CERTRESOLVER=${CERTRESOLVER} \
            SEARX_INTERNAL_URL=${SEARX_INTERNAL_URL} \
            docker compose -p userbrowser -f userbrowser.yml up -d --force-recreate

            echo "$checksum" > ~/.hac-noncritical/.userbrowser_checksum
          else
            echo "No changes detected; skipping redeploy"
          fi

name: Deploy SearX

on:
  push:
    branches:
      - main
    paths:
      - "Docker-NonCritical/Tools/SearX/searx.yml"
      - "Docker-NonCritical/Tools/SearX/settings.yml"
      - ".forgejo/workflows/deploy-searx.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker-noncritical
    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify compose file exists
        run: ls -l "./Docker-NonCritical/Tools/SearX/searx.yml"

      - name: Deploy SearX
        working-directory: "./Docker-NonCritical/Tools/SearX"
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          CERTRESOLVER: ${{ vars.CERTRESOLVER }}
          SEARX_SECRET_KEY: ${{ secrets.SEARX_SECRET_KEY }}
        run: |
          for var in DOMAIN_NAME CERTRESOLVER; do
            eval val=\$$var
            if [ -z "$val" ]; then
              echo "Missing required variable: $var" >&2
              exit 1
            fi
          done

          # Use provided secret or generate a random one
          SECRET_KEY="${SEARX_SECRET_KEY:-$(openssl rand -hex 32)}"

          # Write settings.yml — secret_key injected at deploy time
          sudo mkdir -p /srv/searx/config
          {
            printf '%s\n' 'use_default_settings: true'
            printf '%s\n' ''
            printf '%s\n' 'general:'
            printf '%s\n' '  debug: false'
            printf '%s\n' '  instance_name: "search"'
            printf '%s\n' '  enable_metrics: false'
            printf '%s\n' ''
            printf '%s\n' 'search:'
            printf '%s\n' '  safe_search: 0'
            printf '%s\n' '  default_lang: "en"'
            printf '%s\n' '  ban_time_on_fail: 2'
            printf '%s\n' '  max_ban_time_on_fail: 30'
            printf '%s\n' '  formats:'
            printf '%s\n' '    - html'
            printf '%s\n' '    - json'
            printf '%s\n' ''
            printf '%s\n' 'server:'
            printf '%s\n' '  port: 8080'
            printf '%s\n' '  bind_address: "0.0.0.0"'
            printf "  secret_key: \"%s\"\n" "${SECRET_KEY}"
            printf '%s\n' '  limiter: false'
            printf '%s\n' '  public_instance: false'
            printf '%s\n' ''
            printf '%s\n' 'ui:'
            printf '%s\n' '  default_theme: simple'
            printf '%s\n' '  theme_args:'
            printf '%s\n' '    simple_style: dark'
            printf '%s\n' '  results_on_new_tab: true'
            printf '%s\n' ''
            printf '%s\n' 'outgoing:'
            printf '%s\n' '  request_timeout: 8.0'
            printf '%s\n' '  max_request_timeout: 20.0'
            printf '%s\n' '  enable_http2: true'
            printf '%s\n' '  pool_connections: 100'
            printf '%s\n' '  pool_maxsize: 50'
            printf '%s\n' ''
            printf '%s\n' '# Explicitly enable VPN-friendly + OSINT engines'
            printf '%s\n' '# use_default_settings keeps everything else; we only override these'
            printf '%s\n' 'engines:'
            printf '%s\n' '  # VPN-friendly general web engines (Google/Bing often block VPN IPs)'
            printf '%s\n' '  - name: brave'
            printf '%s\n' '    engine: brave'
            printf '%s\n' '    categories: general, web'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: duckduckgo'
            printf '%s\n' '    engine: duckduckgo'
            printf '%s\n' '    categories: general, web'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: qwant'
            printf '%s\n' '    engine: qwant'
            printf '%s\n' '    categories: general, web, news'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: startpage'
            printf '%s\n' '    engine: startpage'
            printf '%s\n' '    categories: general, web'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: mojeek'
            printf '%s\n' '    engine: mojeek'
            printf '%s\n' '    categories: general, web'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: google'
            printf '%s\n' '    engine: google'
            printf '%s\n' '    categories: general, web, news, images'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: bing'
            printf '%s\n' '    engine: bing'
            printf '%s\n' '    categories: general, web, news, images'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  # Social / OSINT sources'
            printf '%s\n' '  - name: reddit'
            printf '%s\n' '    engine: reddit'
            printf '%s\n' '    categories: social media'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 8.0'
            printf '%s\n' '  - name: github'
            printf '%s\n' '    engine: github'
            printf '%s\n' '    categories: it'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 8.0'
            printf '%s\n' '  - name: stackoverflow'
            printf '%s\n' '    engine: stackoverflow'
            printf '%s\n' '    categories: it, q&a'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 8.0'
            printf '%s\n' '  # Image sources for reverse search / profile photos'
            printf '%s\n' '  - name: google images'
            printf '%s\n' '    engine: google_images'
            printf '%s\n' '    categories: images'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: bing images'
            printf '%s\n' '    engine: bing_images'
            printf '%s\n' '    categories: images'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  - name: brave images'
            printf '%s\n' '    engine: brave'
            printf '%s\n' '    categories: images'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 10.0'
            printf '%s\n' '  # News / social media content'
            printf '%s\n' '  - name: bing news'
            printf '%s\n' '    engine: bing_news'
            printf '%s\n' '    categories: news'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 8.0'
            printf '%s\n' '  - name: duckduckgo news'
            printf '%s\n' '    engine: duckduckgo_news'
            printf '%s\n' '    categories: news'
            printf '%s\n' '    disabled: false'
            printf '%s\n' '    timeout: 8.0'
          } | sudo tee /srv/searx/config/settings.yml > /dev/null

          # Write uwsgi.ini — 8 workers so concurrent UserBrowser queries don't queue/timeout
          {
            printf '%s\n' '[uwsgi]'
            printf '%s\n' 'module = searx.webapp:application'
            printf '%s\n' 'http-socket = 0.0.0.0:8080'
            printf '%s\n' 'workers = 8'
            printf '%s\n' 'threads = 4'
            printf '%s\n' 'enable-threads = true'
            printf '%s\n' 'thunder-lock = true'
            printf '%s\n' 'single-interpreter = true'
            printf '%s\n' 'lazy-apps = true'
            printf '%s\n' 'master = true'
            printf '%s\n' 'pidfile = /tmp/searxng.pid'
            printf '%s\n' 'worker-reload-mercy = 6'
            printf '%s\n' 'disable-logging = true'
            printf '%s\n' 'log-5xx = true'
            printf '%s\n' 'buffer-size = 8192'
            printf '%s\n' 'post-buffering = 4096'
          } | sudo tee /srv/searx/config/uwsgi.ini > /dev/null

          defined_image=$(grep -m1 'image:' searx.yml | awk '{print $2}')
          running_image=$(docker inspect -f '{{.Config.Image}}' searx 2>/dev/null || echo "none")
          checksum=$(cat searx.yml settings.yml ../../.forgejo/workflows/deploy-searx.yml | sha256sum | awk '{print $1}')
          old=$(cat ~/.hac-noncritical/.searx_checksum 2>/dev/null || echo "")

          if [ "$defined_image" != "$running_image" ] || [ "$checksum" != "$old" ]; then
            echo "Redeploying SearX..."
            mkdir -p ~/.hac-noncritical

            docker compose -p searx -f searx.yml down --remove-orphans || true
            DOMAIN_NAME=${DOMAIN_NAME} CERTRESOLVER=${CERTRESOLVER} SEARX_SECRET_KEY=${SEARX_SECRET_KEY} \
              docker compose -p searx -f searx.yml up -d --force-recreate
            echo "$checksum" > ~/.hac-noncritical/.searx_checksum
          else
            echo "No changes detected; skipping redeploy"
          fi
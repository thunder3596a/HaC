name: Deploy SearX

on:
  push:
    branches:
      - main
    paths:
      - "Docker-NonCritical/Tools/SearX/searx.yml"
      - "Docker-NonCritical/Tools/SearX/settings.yml"
      - ".forgejo/workflows/deploy-searx.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: docker-noncritical
    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify compose file exists
        run: ls -l "./Docker-NonCritical/Tools/SearX/searx.yml"

      - name: Deploy SearX
        working-directory: "./Docker-NonCritical/Tools/SearX"
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          CERTRESOLVER: ${{ vars.CERTRESOLVER }}
          SEARX_SECRET_KEY: ${{ secrets.SEARX_SECRET_KEY }}
        run: |
          for var in DOMAIN_NAME CERTRESOLVER; do
            eval val=\$$var
            if [ -z "$val" ]; then
              echo "Missing required variable: $var" >&2
              exit 1
            fi
          done

          # Use provided secret or generate a random one
          SECRET_KEY="${SEARX_SECRET_KEY:-$(openssl rand -hex 32)}"

          # Write settings.yml inline — not tracked in git to avoid accidental secret exposure
          sudo mkdir -p /srv/searx/config
          sudo tee /srv/searx/config/settings.yml > /dev/null <<EOF
use_default_settings: true

general:
  debug: false
  instance_name: "search"
  enable_metrics: false

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SECRET_KEY}"
  limiter: false
  public_instance: false

ui:
  default_theme: simple
  theme_args:
    simple_style: dark
  results_on_new_tab: true

outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  enable_http2: true
EOF

          defined_image=$(grep -m1 'image:' searx.yml | awk '{print $2}')
          running_image=$(docker inspect -f '{{.Config.Image}}' searx 2>/dev/null || echo "none")
          checksum=$(sha256sum searx.yml settings.yml | sha256sum | awk '{print $1}')
          old=$(cat ~/.hac-noncritical/.searx_checksum 2>/dev/null || echo "")

          if [ "$defined_image" != "$running_image" ] || [ "$checksum" != "$old" ]; then
            echo "Redeploying SearX..."
            mkdir -p ~/.hac-noncritical

            docker compose -p searx -f searx.yml down --remove-orphans || true
            DOMAIN_NAME=${DOMAIN_NAME} CERTRESOLVER=${CERTRESOLVER} SEARX_SECRET_KEY=${SEARX_SECRET_KEY} \
              docker compose -p searx -f searx.yml up -d --force-recreate
            echo "$checksum" > ~/.hac-noncritical/.searx_checksum
          else
            echo "No changes detected; skipping redeploy"
          fi
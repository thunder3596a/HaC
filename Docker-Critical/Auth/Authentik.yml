services:
  authentik-db:
    image: postgres:16
    container_name: authentik-db
    restart: unless-stopped
    networks:
      - authnet
    volumes:
      - /srv/authentik/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=authentik
      - POSTGRES_USER=authentik
      - POSTGRES_PASSWORD=${AUTHENTIK_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "ha.monitor=true"
      - "ha.category=auth"
      - "ha.compose-file=Docker-Critical/Auth/Authentik.yml"
      - "ha.service-name=authentik-db"

  authentik-redis:
    image: redis:alpine
    container_name: authentik-redis
    restart: unless-stopped
    networks:
      - authnet
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      - "ha.monitor=true"
      - "ha.category=auth"
      - "ha.compose-file=Docker-Critical/Auth/Authentik.yml"
      - "ha.service-name=authentik-redis"

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-server
    restart: unless-stopped
    command: server
    networks:
      - authnet
    environment:
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_POSTGRESQL__HOST=authentik-db
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=false
    volumes:
      - /srv/authentik/media:/media
      - /srv/authentik/custom-templates:/templates
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=authnet"
      - "traefik.http.routers.authentik.rule=Host(`authentik.${DOMAIN_NAME}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls=true"
      - "traefik.http.routers.authentik.tls.certresolver=${CERTRESOLVER:-cloudflare}"
      - "traefik.http.routers.authentik.tls.domains[0].main=authentik.${DOMAIN_NAME}"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "ha.monitor=true"
      - "ha.category=auth"
      - "ha.compose-file=Docker-Critical/Auth/Authentik.yml"
      - "ha.service-name=authentik-server"
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    networks:
      - authnet
    environment:
      - AUTHENTIK_REDIS__HOST=authentik-redis
      - AUTHENTIK_POSTGRESQL__HOST=authentik-db
      - AUTHENTIK_POSTGRESQL__USER=authentik
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/authentik/media:/media
      - /srv/authentik/certs:/certs
      - /srv/authentik/custom-templates:/templates
    labels:
      - "ha.monitor=true"
      - "ha.category=auth"
      - "ha.compose-file=Docker-Critical/Auth/Authentik.yml"
      - "ha.service-name=authentik-worker"
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy

networks:
  authnet:
    external: true

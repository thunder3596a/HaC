services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    networks:
      - toolsproxy
    volumes:
      - /srv/dockhand/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - ENCRYPTION_KEY=${DOCKHAND_ENCRYPTION_KEY}
      - HOST_DATA_DIR=/srv/dockhand/data
    labels:
      # Traefik routing - Dockhand handles its own auth (OIDC via Authentik)
      - traefik.enable=true
      - traefik.docker.network=toolsproxy
      - traefik.http.routers.dockhand.entrypoints=websecure
      - traefik.http.routers.dockhand.rule=Host(`dockhand.${DOMAIN_NAME}`)
      - traefik.http.routers.dockhand.tls.certresolver=${CERTRESOLVER}
      - traefik.http.routers.dockhand.tls.domains[0].main=dockhand.${DOMAIN_NAME}
      - traefik.http.services.dockhand.loadbalancer.server.port=3000
      # Watchtower auto-updates
      - com.centurylinklabs.watchtower.enable=true
      # Home Assistant monitoring
      - ha.monitor=true
      - ha.category=tools
      - ha.compose-file=Docker-Critical/Tools/Dockhand/dockhand.yml
      - ha.service-name=dockhand

networks:
  toolsproxy:
    external: true

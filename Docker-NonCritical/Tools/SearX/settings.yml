# SearXNG settings.yml
# Optimized for UserBrowser OSINT + general homelab use
# Deployed to /srv/searx/config/settings.yml via deploy-searx workflow

use_default_settings: true

general:
  debug: false
  instance_name: "search"
  privacypolicy_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  ban_time_on_fail: 2         # fast recovery; UserBrowser fires many concurrent queries
  max_ban_time_on_fail: 30    # don't lock out engines for long under heavy load
  formats:
    - html
    - json           # required for UserBrowser API calls

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: "https://search.${DOMAIN_NAME}/"
  image_proxy: false
  method: "GET"
  limiter: false     # internal-only, no public rate limiting needed
  public_instance: false

ui:
  static_use_hash: true
  infinite_scroll: false
  default_theme: simple
  theme_args:
    simple_style: dark
  results_on_new_tab: true
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty

# Outgoing request settings — tuned for UserBrowser concurrent OSINT searches
# uwsgi.ini (written by deploy workflow) sets workers=8 threads=4 for concurrency
outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 50    # 50 allows ~8 workers × outgoing fan-out without starving
  enable_http2: true

# Engines — enable high-value sources; disable noisy/redundant ones
# For OSINT use, prioritize: Google, Bing, DuckDuckGo, Brave, Startpage
# Also enable: Reddit, GitHub, Gitlab, StackOverflow, HackerNews for code/paste
# News: Google News, Bing News
engines:
  # ── Web search ────────────────────────────────────────────────
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  # ── News ──────────────────────────────────────────────────────
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  - name: bing news
    engine: bing_news
    shortcut: bn
    disabled: false

  - name: yahoo news
    engine: yahoo_news
    shortcut: yn
    disabled: false

  # ── Social / community ─────────────────────────────────────────
  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false
    time_range_support: false

  # ── Developer / code ──────────────────────────────────────────
  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: gitlab
    engine: gitlab
    shortcut: gl
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false

  - name: searchcode code
    engine: searchcode_code
    shortcut: sc
    disabled: false

  - name: hacker news
    engine: hackernews
    shortcut: hn
    disabled: false

  # ── Paste / code sharing ───────────────────────────────────────
  - name: pastebin
    engine: xpath
    shortcut: pb
    url: "https://pastebin.com/search?q={query}"
    url_xpath: '//div[@class="search-result"]//a/@href'
    title_xpath: '//div[@class="search-result"]//a'
    content_xpath: '//div[@class="preview"]'
    categories: [general]
    disabled: false

  # ── Images ────────────────────────────────────────────────────
  - name: google images
    engine: google_images
    shortcut: gimg
    disabled: false

  - name: bing images
    engine: bing_images
    shortcut: bimg
    disabled: false

  - name: brave images
    engine: brave.images
    shortcut: brimg
    disabled: false

  # ── Video ─────────────────────────────────────────────────────
  - name: youtube
    engine: youtube_noapi
    shortcut: yt
    disabled: false

  - name: bing videos
    engine: bing_videos
    shortcut: bv
    disabled: false

  # ── IT / docs ─────────────────────────────────────────────────
  - name: arch linux wiki
    engine: archlinux
    shortcut: al
    disabled: false

  - name: dockerhub
    engine: dockerhub
    shortcut: dh
    disabled: false

  - name: pypi
    engine: pypi
    shortcut: pypi
    disabled: false

  - name: npm
    engine: npm
    shortcut: npm
    disabled: false

  # ── Maps (useful, low noise) ───────────────────────────────────
  - name: openstreetmap
    engine: openstreetmap
    shortcut: osm
    disabled: false

  # ── Disable noisy / redundant / broken engines ────────────────
  - name: 1337x
    disabled: true
  - name: kickass
    disabled: true
  - name: piratebay
    disabled: true
  - name: btdigg
    disabled: true
  - name: nyaa
    disabled: true
  - name: solidtorrents
    disabled: true
  - name: sepiasearch
    disabled: true
  - name: yahoo
    disabled: true   # use yahoo news only; web results dupe bing

categories_as_tabs:
  general:
    - general
  news:
    - news
  images:
    - images
  videos:
    - videos
  social media:
    - social media
  it:
    - it
    - software wikis
  science:
    - science
  map:
    - map

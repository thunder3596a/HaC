networks:
  toolsproxy:
    external: true

services:
  searx:
    image: searxng/searxng:latest
    container_name: searx
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.2'

    environment:
      - SEARXNG_SECRET=${SEARX_SECRET_KEY}

    labels:
      # Home Assistant monitoring
      - ha.monitor=true
      - ha.category=tools
      - ha.compose-file=Docker-NonCritical/Tools/SearX/searx.yml
      - ha.service-name=searx
      # Traefik routing
      - traefik.enable=true
      - traefik.http.routers.searx.entrypoints=websecure
      - traefik.http.routers.searx.rule=Host(`search.${DOMAIN_NAME}`)
      - traefik.http.routers.searx.service=searx
      - traefik.http.services.searx.loadbalancer.server.port=8080
      - traefik.http.routers.searx.tls.certresolver=${CERTRESOLVER:-cloudflare}
      # Watchtower updates
      - com.centurylinklabs.watchtower.enable=true

    networks:
      - toolsproxy

    volumes:
      - /srv/searx/config/settings.yml:/etc/searxng/settings.yml

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
networks:
  aiproxy:
    external: true

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    environment:
      - OLLAMA_BASE_URL=http://192.168.19.19:11434
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=false
      - DEFAULT_MODELS=qwen2.5-coder:14b
      - ENABLE_OLLAMA_API=true
      - ENABLE_OPENAI_API=false
      - ENABLE_RAG_WEB_SEARCH=false
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - OAUTH_CLIENT_ID=${OPENWEBUI_OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OPENWEBUI_OAUTH_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=https://authentik.${DOMAIN_NAME}/application/o/openwebui/
      - OAUTH_PROVIDER_NAME=Authentik
      - OAUTH_SCOPES=openid email profile

    volumes:
      - /srv/openwebui_data:/app/backend/data

    networks:
      - aiproxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${DOMAIN_NAME}`)"
      - "traefik.http.routers.openwebui.service=openwebui"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
      - "traefik.http.routers.openwebui.tls.certresolver=${CERTRESOLVER:-cloudflare}"
      - "traefik.http.routers.openwebui.tls.domains[0].main=chat.${DOMAIN_NAME}"
      - "ha.monitor=true"
      - "ha.category=automation"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/openwebui.yml"
      - "ha.service-name=open-webui"

volumes:
  openwebui_data:
    name: openwebui_data

services:
  # IBM ContextForge MCP Gateway - Central gateway for all MCP servers
  mcp-gateway:
    image: ghcr.io/ibm/mcp-context-forge:latest
    container_name: mcp-gateway
    restart: unless-stopped
    networks:
      - mcpnet
      - aiproxy
    ports:
      - "4444:4444"
    environment:
      - DATABASE_URL=postgresql+psycopg://${MCP_DB_USERNAME:-mcpuser}:${MCP_DB_PASSWORD}@mcp-postgres:5432/mcpgateway
      - REDIS_URL=redis://redis:6379
      - MCPGATEWAY_HOST=0.0.0.0
      - MCPGATEWAY_PORT=4444
      - MCPGATEWAY_UI_ENABLED=true
      - MCPGATEWAY_ADMIN_API_ENABLED=true
      - PLUGINS_ENABLED=true
      - GUNICORN_CMD_ARGS=--bind 0.0.0.0:4444
      - SSRF_PROTECTION_ENABLED=false
      - SSRF_DNS_FAIL_CLOSED=false
    depends_on:
      mcp-postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /srv/mcp-gateway/config:/app/config
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.docker.network=aiproxy
      - traefik.http.routers.mcpgateway.entrypoints=websecure
      - traefik.http.routers.mcpgateway.rule=Host(`mcp.${DOMAIN_NAME}`)
      - traefik.http.routers.mcpgateway.service=mcpgateway
      - traefik.http.routers.mcpgateway.middlewares=mcpgateway-headers
      - traefik.http.services.mcpgateway.loadbalancer.server.port=4444
      - traefik.http.routers.mcpgateway.tls.certresolver=${CERTRESOLVER}
      - traefik.http.routers.mcpgateway.tls.domains[0].main=mcp.${DOMAIN_NAME}
      - traefik.http.middlewares.mcpgateway-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.mcpgateway-headers.headers.customrequestheaders.X-Forwarded-Scheme=https
      - traefik.http.middlewares.mcpgateway-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpgateway.yml"
      - "ha.service-name=mcp-gateway"

  # PostgreSQL for MCP Gateway
  mcp-postgres:
    image: postgres:15
    container_name: mcp-postgres
    restart: unless-stopped
    networks:
      - mcpnet
    environment:
      - POSTGRES_DB=mcpgateway
      - POSTGRES_USER=${MCP_DB_USERNAME:-mcpuser}
      - POSTGRES_PASSWORD=${MCP_DB_PASSWORD}
    volumes:
      - /srv/mcp-gateway/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d mcpgateway -U ${MCP_DB_USERNAME:-mcpuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpgateway.yml"
      - "ha.service-name=mcp-postgres"

  # Redis for MCP Gateway caching and federation
  redis:
    image: redis:alpine
    container_name: mcp-redis
    restart: unless-stopped
    networks:
      - mcpnet
    volumes:
      - /srv/mcp-gateway/redis:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpgateway.yml"
      - "ha.service-name=redis"

networks:
  mcpnet:
    name: mcpnet
    external: true
  aiproxy:
    external: true

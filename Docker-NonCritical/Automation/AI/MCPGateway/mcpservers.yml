  # n8n MCP Server — allows AI to list/create/manage N8N workflows
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: n8n-mcp
    restart: unless-stopped
    networks:
      - mcpnet
    environment:
      - N8N_API_URL=${N8N_URL}/api/v1
      - N8N_API_KEY=${N8N_API_KEY}
      - MCP_MODE=http
      - PORT=3000
      - HOST=0.0.0.0
      - AUTH_TOKEN=${N8N_MCP_AUTH_TOKEN}
      - AUTH_RATE_LIMIT_MAX=1000
      - AUTH_RATE_LIMIT_WINDOW=60000
    labels:
      - com.centurylinklabs.watchtower.enable=true
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
      - "ha.service-name=n8n-mcp"


services:
  # Vikunja MCP Server (task management)
  vikunja-mcp:
    image: node:20-alpine
    container_name: mcp-vikunja
    restart: unless-stopped
    networks:
      - mcpnet
    working_dir: /app
    # Use the lighter vikunja-mcp package here because the previous package
    # fails ContextForge gateway initialization with schema parsing errors.
    command: sh -c "npx -y supergateway --port 3000 --outputTransport streamableHttp --stdio 'npx -y vikunja-mcp'"
    environment:
      # Compatibility: different Vikunja MCP packages use different env var names.
      - VIKUNJA_API_BASE=${VIKUNJA_URL}
      - VIKUNJA_URL=${VIKUNJA_URL}
      - VIKUNJA_API_TOKEN=${VIKUNJA_API_TOKEN}
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
      - "ha.service-name=vikunja-mcp"

  # HomeBox MCP Server (inventory management)
  homebox-mcp:
    build:
      context: ./mcp-servers/homebox
      dockerfile: Dockerfile
    container_name: mcp-homebox
    restart: unless-stopped
    networks:
      - mcpnet
    working_dir: /app
    command: sh -c "npx -y supergateway --port 3000 --outputTransport streamableHttp --stdio 'node index.js'"
    environment:
      - HOMEBOX_URL=${HOMEBOX_URL}
      - HOMEBOX_EMAIL=${HOMEBOX_EMAIL}
      - HOMEBOX_PASSWORD=${HOMEBOX_PASSWORD}
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
      - "ha.service-name=homebox-mcp"

  # OPNsense MCP Server — disabled: @pixelworlds/opnsense-mcp-server does not exist on npm

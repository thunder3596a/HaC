  #     - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
  #     - "ha.service-name=opnsense-mcp"

  # NetBox MCP Server — disabled: @netboxlabs/netbox-mcp-server does not exist on npm
  # Find the correct package name before re-enabling
  # netbox-mcp:
  #   image: node:20-alpine
  #   container_name: mcp-netbox
  #   restart: unless-stopped
  #   networks:
  #     - mcpnet
  #   working_dir: /app
  #   command: sh -c "npx -y supergateway --port 3000 --outputTransport streamableHttp --stdio 'npx -y @netboxlabs/netbox-mcp-server'"
  #   environment:
  #     - NETBOX_URL=${NETBOX_URL}
  #     - NETBOX_API_TOKEN=${NETBOX_API_TOKEN}
  #   labels:
  #     - com.centurylinklabs.watchtower.enable=false
  #     - "ha.monitor=true"
  #     - "ha.category=tools"
  #     - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
  #     - "ha.service-name=netbox-mcp"

  # Forgejo MCP Server — issues, PRs, files, branches, actions, notifications
  forgejo-mcp:
    build:
      context: ./mcp-servers/forgejo
      dockerfile: Dockerfile
    container_name: mcp-forgejo
    restart: unless-stopped
    networks:
      - mcpnet
    environment:
      - FORGEJO_URL=${FORGEJO_URL}
      - FORGEJO_ACCESS_TOKEN=${FORGEJO_TOKEN}
      - FORGEJO_USER_AGENT=forgejo-mcp/2.17.0
    labels:
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
      - "ha.service-name=forgejo-mcp"

  # Dockhand MCP Server — Docker container and stack management via Dockhand API
  dockhand-mcp:
    build:
      context: ./mcp-servers/dockhand
      dockerfile: Dockerfile
    container_name: mcp-dockhand
    restart: unless-stopped
    networks:
      - mcpnet
    command: sh -c "npx -y supergateway --port 3000 --outputTransport streamableHttp --stdio 'node index.js'"
    mem_limit: 512m
    environment:
      - DOCKHAND_URL=${DOCKHAND_URL}
      - DOCKHAND_USERNAME=${DOCKHAND_USERNAME}
      - DOCKHAND_PASSWORD=${DOCKHAND_PASSWORD}
      - NODE_OPTIONS=--max-old-space-size=384
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
      - "ha.service-name=dockhand-mcp"

  # n8n MCP Server — allows AI to list/create/manage N8N workflows
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: n8n-mcp
    restart: unless-stopped
    networks:
      - mcpnet
    environment:
      - N8N_API_URL=${N8N_URL}/api/v1
      - N8N_API_KEY=${N8N_API_KEY}
      - MCP_MODE=http
      - PORT=3000
      - HOST=0.0.0.0
      - AUTH_TOKEN=${N8N_MCP_AUTH_TOKEN}
      - AUTH_RATE_LIMIT_MAX=1000
      - AUTH_RATE_LIMIT_WINDOW=60000
    labels:
      - "ha.monitor=true"
      - "ha.category=tools"
      - "ha.compose-file=Docker-NonCritical/Automation/AI/MCPGateway/mcpservers.yml"
      - "ha.service-name=n8n-mcp"


networks:
  toolsproxy:
    external: true
  torrentproxy:
    external: true

services:
  searx:
    image: searxng/searxng:latest
    container_name: searx
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'

    environment:
      - TZ=${TZ}
      - HTTP_PROXY=http://gluetun:8888
      - HTTPS_PROXY=http://gluetun:8888
      - http_proxy=http://gluetun:8888
      - https_proxy=http://gluetun:8888
      - NO_PROXY=localhost,127.0.0.1,::1
      - no_proxy=localhost,127.0.0.1,::1

    labels:
      # Home Assistant monitoring
      - ha.monitor=true
      - ha.category=tools
      - ha.compose-file=Docker-NonCritical/Tools/SearX/searx.yml
      - ha.service-name=searx
      # Internal only — Traefik routing is on searx-direct
      - traefik.enable=false

    networks:
      - toolsproxy
      - torrentproxy

    volumes:
      - /srv/searx/config:/etc/searxng:rw

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  searx-direct:
    image: searxng/searxng:latest
    container_name: searx-direct
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'

    environment:
      - TZ=${TZ}

    labels:
      # Home Assistant monitoring
      - ha.monitor=true
      - ha.category=tools
      - ha.compose-file=Docker-NonCritical/Tools/SearX/searx.yml
      - ha.service-name=searx-direct
      # Traefik routing — public-facing instance (no VPN proxy, better engine availability)
      - traefik.enable=true
      - traefik.http.routers.searx.entrypoints=websecure
      - traefik.http.routers.searx.rule=Host(`search.${DOMAIN_NAME}`)
      - traefik.http.routers.searx.service=searx
      - traefik.http.services.searx.loadbalancer.server.port=8080
      - traefik.http.routers.searx.tls.certresolver=${CERTRESOLVER:-cloudflare}

    networks:
      - toolsproxy

    volumes:
      - /srv/searx-direct/config:/etc/searxng:rw

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s